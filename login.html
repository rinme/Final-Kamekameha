<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Log in – SoundWave</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="js/tailwind-config.js"></script>
  <link rel="stylesheet" href="css/login.css">
</head>

<body class="dark:bg-[#121212] bg-gray-100 dark:text-white text-gray-900 min-h-screen flex flex-col">

  <!-- ─── Theme Toggle (top right) ─── -->
  <div class="fixed top-4 right-4 z-50">
    <button onclick="toggleTheme()"
      class="dark:bg-[#282828] bg-white border dark:border-gray-700 border-gray-300 rounded-full w-10 h-10 flex items-center justify-center hover:scale-110 shadow-md"
      title="Toggle theme">
      <span id="theme-icon">☀️</span>
    </button>
  </div>

  <!-- ─── Main Centered Content ─── -->
  <main class="flex-1 flex flex-col items-center justify-center px-4 py-12">

    <!-- Logo -->
    <a href="index.html" class="flex items-center gap-2 mb-8 group">
      <span class="text-4xl group-hover:scale-110 inline-block transition-transform">🎵</span>
      <span class="text-2xl font-bold text-brand">SoundWave</span>
    </a>

    <!-- Card -->
    <div class="w-full max-w-md dark:bg-[#242424] bg-white rounded-2xl shadow-2xl px-8 py-10">

      <!-- Title -->
      <h1 class="text-3xl font-bold text-center mb-8">Log in to SoundWave</h1>

      <!-- Social Login Buttons -->
      <div class="space-y-3 mb-6">

        <!-- Google -->
        <button class="social-btn w-full flex items-center justify-center gap-3 border dark:border-gray-600 border-gray-300
          dark:bg-transparent bg-white rounded-full py-3 px-5 font-semibold text-sm
          hover:dark:border-white hover:border-gray-900 transition-all duration-200">
          <!-- Google SVG icon -->
          <svg class="w-5 h-5 shrink-0" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
            <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
            <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
            <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
          </svg>
          Continue with Google
        </button>

        <!-- Facebook -->
        <button class="social-btn w-full flex items-center justify-center gap-3 border dark:border-gray-600 border-gray-300
          dark:bg-transparent bg-white rounded-full py-3 px-5 font-semibold text-sm
          hover:dark:border-white hover:border-gray-900 transition-all duration-200">
          <!-- Facebook SVG icon -->
          <svg class="w-5 h-5 shrink-0" viewBox="0 0 24 24" fill="#1877F2" xmlns="http://www.w3.org/2000/svg">
            <path d="M24 12.073C24 5.406 18.627 0 12 0S0 5.406 0 12.073C0 18.1 4.388 23.094 10.125 24v-8.437H7.078v-3.49h3.047V9.41c0-3.025 1.792-4.697 4.533-4.697 1.312 0 2.686.236 2.686.236v2.97h-1.513c-1.491 0-1.956.93-1.956 1.886v2.268h3.328l-.532 3.49h-2.796V24C19.612 23.094 24 18.1 24 12.073z"/>
          </svg>
          Continue with Facebook
        </button>
      </div>

      <!-- Divider -->
      <div class="flex items-center gap-3 my-6">
        <div class="flex-1 h-px dark:bg-gray-700 bg-gray-300"></div>
        <span class="text-xs font-bold dark:text-gray-400 text-gray-500 tracking-widest">OR</span>
        <div class="flex-1 h-px dark:bg-gray-700 bg-gray-300"></div>
      </div>

      <!-- Login Form -->
      <form id="login-form" onsubmit="handleLogin(event)" novalidate class="space-y-4">

        <!-- Email / Username -->
        <div>
          <label for="email-input" class="block text-sm font-semibold mb-1.5">Email or username</label>
          <input id="email-input" type="text" placeholder="Email or username"
            class="sw-input w-full px-4 py-3 rounded-md border dark:border-gray-600 border-gray-300
              dark:bg-[#3e3e3e] bg-gray-50 dark:placeholder-gray-500 placeholder-gray-400
              text-sm focus:outline-none focus:border-white dark:focus:border-white focus:border-brand transition-colors"
          />
          <p id="email-error" class="text-red-400 text-xs mt-1 hidden">Please enter your email or username.</p>
        </div>

        <!-- Password -->
        <div>
          <label for="password-input" class="block text-sm font-semibold mb-1.5">Password</label>
          <div class="relative">
            <input id="password-input" type="password" placeholder="Password"
              class="sw-input w-full px-4 py-3 pr-12 rounded-md border dark:border-gray-600 border-gray-300
                dark:bg-[#3e3e3e] bg-gray-50 dark:placeholder-gray-500 placeholder-gray-400
                text-sm focus:outline-none focus:border-white dark:focus:border-white focus:border-brand transition-colors"
            />
            <!-- Show/hide toggle -->
            <button type="button" onclick="togglePasswordVisibility('password-input', 'eye-icon-1')"
              class="eye-btn absolute right-3 top-1/2 -translate-y-1/2 dark:text-gray-400 text-gray-500 hover:dark:text-white hover:text-black">
              <svg id="eye-icon-1" class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                <!-- Eye open -->
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                <circle cx="12" cy="12" r="3"/>
              </svg>
            </button>
          </div>
          <p id="password-error" class="text-red-400 text-xs mt-1 hidden">Please enter your password.</p>
        </div>

        <!-- Log In Button -->
        <button type="submit"
          class="w-full bg-brand text-black font-bold py-3.5 rounded-full text-sm
            hover:scale-[1.02] hover:brightness-110 active:scale-100 transition-all duration-200 mt-2">
          Log In
        </button>

      </form>

      <!-- Forgot Password -->
      <div class="text-center mt-4">
        <a href="#" class="text-sm dark:text-white text-gray-700 underline hover:text-brand transition-colors">
          Forgot your password?
        </a>
      </div>

      <!-- Divider -->
      <div class="h-px dark:bg-gray-700 bg-gray-300 my-6"></div>

      <!-- Sign Up Link -->
      <p class="text-center text-sm dark:text-gray-400 text-gray-500">
        Don't have an account?
        <a href="signup.html" class="text-white font-bold underline hover:text-brand transition-colors">Sign up</a>
      </p>

    </div>

    <!-- Footer note -->
    <p class="mt-8 text-xs dark:text-gray-600 text-gray-400 text-center max-w-xs">
      This site is protected by reCAPTCHA and the Google
      <a href="#" class="underline hover:text-brand">Privacy Policy</a> and
      <a href="#" class="underline hover:text-brand">Terms of Service</a> apply.
    </p>

  </main>

  <!-- ─── JavaScript ─── -->
  <script src="js/login.js"></script>
</body>
</html>
